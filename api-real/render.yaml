services:
  - type: web
    name: acquisitor-api
    runtime: docker
    plan: starter
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: acquisitor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://acquisitor.vercel.app
    healthCheckPath: /health

databases:
  - name: acquisitor-db
    plan: starter
    databaseName: acquisitor
    user: acquisitor
